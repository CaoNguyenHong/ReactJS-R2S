<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/todo.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <title>Week 3 — Todo DOM</title>
  </head>
  <body>
    <main id="app" class="todo-app">
      <h1>Todo (DOM)</h1>
      <form id="todo-form">
        <input
          id="todo-input"
          type="text"
          name="title"
          autocomplete="off"
          placeholder="Thêm việc…"
          maxlength="500"
        />
        <button type="submit">Thêm</button>
      </form>
      <div id="filters" class="filters">
        <button type="button" data-filter="all">Tất cả</button>
        <button type="button" data-filter="active">Đang làm</button>
        <button type="button" data-filter="done">Xong</button>
      </div>
      <p class="meta"><span id="count-active">0</span> việc chưa xong</p>
      <ul id="todo-list" class="todo-list"></ul>
    </main>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
